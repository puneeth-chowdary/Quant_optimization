<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Optimizer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color: #e0e0e0;
        }

        /* Subtle mouse tracking gradient */
        .mouse-gradient {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(80, 80, 80, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }

        /* Minimal grid overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(60, 60, 60, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(60, 60, 60, 0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        /* Minimal header */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            color: #c0c0c0;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Simple greeting */
        .greeting {
            font-size: 1.1rem;
            font-weight: 300;
            color: #888;
            margin-bottom: 60px;
            letter-spacing: 0.5px;
        }

        /* Clean horizontal layout */
        .stocks-container {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stock-card {
            flex: 1;
            min-width: 180px;
            max-width: 200px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px 16px;
            border: 1px solid rgba(80, 80, 80, 0.2);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(120, 120, 120, 0.3), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .stock-card:hover {
            transform: translateY(-8px);
            border-color: rgba(120, 120, 120, 0.4);
            background: rgba(25, 25, 25, 0.7);
        }

        .stock-card:hover::before {
            opacity: 1;
        }

        .stock-number {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 2rem;
            font-weight: 200;
            color: rgba(100, 100, 100, 0.15);
        }

        .input-wrapper {
            margin-bottom: 16px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid rgba(80, 80, 80, 0.2);
            border-radius: 6px;
            color: #c0c0c0;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: rgba(120, 120, 120, 0.5);
            background: rgba(20, 20, 20, 0.9);
        }

        input::placeholder {
            color: rgba(150, 150, 150, 0.3);
        }

        /* Autocomplete dropdown */
        .autocomplete-container {
            position: relative;
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid rgba(100, 100, 100, 0.3);
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .autocomplete-dropdown.active {
            display: block;
        }

        .autocomplete-item {
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(60, 60, 60, 0.2);
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover {
            background: rgba(40, 40, 40, 0.8);
        }

        .autocomplete-symbol {
            color: #c0c0c0;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .autocomplete-name {
            color: #777;
            font-size: 0.75rem;
            margin-top: 2px;
        }

        /* Custom scrollbar for dropdown */
        .autocomplete-dropdown::-webkit-scrollbar {
            width: 6px;
        }

        .autocomplete-dropdown::-webkit-scrollbar-track {
            background: rgba(20, 20, 20, 0.5);
        }

        .autocomplete-dropdown::-webkit-scrollbar-thumb {
            background: rgba(80, 80, 80, 0.5);
            border-radius: 3px;
        }

        .autocomplete-dropdown::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 100, 100, 0.7);
        }

        /* Button container */
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        /* Add stock button */
        .add-stock-btn {
            padding: 14px 24px;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(100, 100, 100, 0.3);
            border-radius: 8px;
            color: #999;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .add-stock-btn:hover {
            background: rgba(40, 40, 40, 0.9);
            border-color: rgba(120, 120, 120, 0.5);
            color: #b0b0b0;
            transform: translateY(-2px);
        }

        /* Remove stock button */
        .remove-stock-btn {
            padding: 14px 24px;
            background: rgba(40, 20, 20, 0.6);
            border: 1px solid rgba(100, 60, 60, 0.3);
            border-radius: 8px;
            color: #999;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .remove-stock-btn:hover {
            background: rgba(50, 25, 25, 0.8);
            border-color: rgba(120, 80, 80, 0.5);
            color: #b0b0b0;
            transform: translateY(-2px);
        }

        .remove-stock-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Minimal button */
        .optimize-btn {
            padding: 14px 32px;
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid rgba(100, 100, 100, 0.3);
            border-radius: 8px;
            color: #c0c0c0;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .optimize-btn:hover {
            background: rgba(50, 50, 50, 0.9);
            border-color: rgba(120, 120, 120, 0.5);
            transform: translateY(-2px);
        }

        /* ----------------------------------------------------------------
           OUTPUT DISPLAY (improved for Claude-style formatting)
        ---------------------------------------------------------------- */
        .output-display {
            max-width: 900px;
            margin: 40px auto 0;
            padding: 0;
            background: transparent;
            border: none;
            display: none;
        }

        .output-display.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .output-card {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(100, 100, 100, 0.25);
            border-radius: 12px;
            overflow: hidden;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(80, 80, 80, 0.3);
        }

        .output-title {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            margin: 0;
        }

        .output-badge {
            font-size: 0.7rem;
            color: #777;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .output-body {
            padding: 24px;
            max-height: 600px;
            overflow-y: auto;
        }

        /* Custom scrollbar for output body */
        .output-body::-webkit-scrollbar {
            width: 6px;
        }
        .output-body::-webkit-scrollbar-track {
            background: rgba(20,20,20,0.5);
        }
        .output-body::-webkit-scrollbar-thumb {
            background: rgba(80,80,80,0.6);
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .stocks-container {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 1px;
            }
            
            .stocks-container {
                flex-direction: column;
            }
            
            .stock-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="mouse-gradient" id="mouseGradient"></div>
    
    <!-- Minimal grid overlay -->
    <div class="grid-overlay"></div>
    
    <div class="container">

        <div class="header">
            <h1>Portfolio Optimizer</h1>
            <div class="greeting" id="greeting">Good Evening</div>
        </div>
        
        <!-- Stock cards -->

            <div class="stock-card">
                <div class="stock-number">02</div>

                        <input type="text" id="stock2" placeholder="GOOGL" autocomplete="off">
                        <div class="autocomplete-dropdown" id="dropdown2"></div>
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="qty2">Quantity</label>
                    <input type="number" id="qty2" placeholder="0" min="0">
                </div>
            </div>
            
            <!-- Stock 3 -->
            <div class="stock-card">
                <div class="stock-number">03</div>
                <div class="input-wrapper">
                    <label for="stock3">Stock</label>
                    <div class="autocomplete-container">
                        <input type="text" id="stock3" placeholder="TSLA" autocomplete="off">
                        <div class="autocomplete-dropdown" id="dropdown3"></div>
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="qty3">Quantity</label>
                    <input type="number" id="qty3" placeholder="0" min="0">
                </div>
            </div>
            
            <!-- Stock 4 -->
            <div class="stock-card">
                <div class="stock-number">04</div>
                <div class="input-wrapper">
                    <label for="stock4">Stock</label>
                    <div class="autocomplete-container">
                        <input type="text" id="stock4" placeholder="MSFT" autocomplete="off">
                        <div class="autocomplete-dropdown" id="dropdown4"></div>
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="qty4">Quantity</label>
                    <input type="number" id="qty4" placeholder="0" min="0">
                </div>
            </div>
            
            <!-- Stock 5 -->
            <div class="stock-card">
                <div class="stock-number">05</div>
                <div class="input-wrapper">
                    <label for="stock5">Stock</label>
                    <div class="autocomplete-container">
                        <input type="text" id="stock5" placeholder="AMZN" autocomplete="off">
                        <div class="autocomplete-dropdown" id="dropdown5"></div>
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="qty5">Quantity</label>

        </div>
        
        <!-- Buttons -->
        <div class="button-container">
            <button class="add-stock-btn" onclick="addStock()">
                + Add Stock
            </button>
            <button class="remove-stock-btn" id="removeBtn" onclick="removeStock()">
                - Remove Stock
            </button>
            <button class="optimize-btn" onclick="optimizePortfolio()">
                Optimize Portfolio
            </button>
        </div>

        <!-- Output Display (Claude-style formatting) -->
        <div class="output-display" id="outputDisplay">
            <div class="output-content" id="outputContent"></div>
        </div>
    </div>

    <script>
        let stockCount = 5;

        // Set greeting based on time of day
        function setGreeting() {
            const hour = new Date().getHours();
            const greetingEl = document.getElementById('greeting');
            
            if (hour >= 5 && hour < 12) {
                greetingEl.textContent = 'Good Morning';
            } else if (hour >= 12 && hour < 17) {
                greetingEl.textContent = 'Good Afternoon';
            } else if (hour >= 17 && hour < 21) {
                greetingEl.textContent = 'Good Evening';
            } else {
                greetingEl.textContent = 'Late Night';
            }
        }
        
        setGreeting();
        
        // Add new stock card
        function addStock() {
            stockCount++;
            const container = document.querySelector('.stocks-container');
            
            const stockCard = document.createElement('div');
            stockCard.className = 'stock-card';
            stockCard.innerHTML = `
                <div class="stock-number">${String(stockCount).padStart(2, '0')}</div>
                <div class="input-wrapper">
                    <label for="stock${stockCount}">Stock</label>
                    <div class="autocomplete-container">
                        <input type="text" id="stock${stockCount}" placeholder="SYMBOL" autocomplete="off">
                        <div class="autocomplete-dropdown" id="dropdown${stockCount}"></div>
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="qty${stockCount}">Quantity</label>
                    <input type="number" id="qty${stockCount}" placeholder="0" min="0">
                </div>
            `;
            
            container.appendChild(stockCard);
            
            // Add hover effect to new card
            stockCard.addEventListener('mousemove', (e) => {
                const rect = stockCard.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;
                
                stockCard.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-8px)`;
            });
            
            stockCard.addEventListener('mouseleave', () => {
                stockCard.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0)';
            });
            
            // Setup autocomplete for the new input
            setupAutocomplete(stockCount);
            updateRemoveButton();
        }
        
        // Remove last stock card
        function removeStock() {
            if (stockCount <= 1) return;
            
            const container = document.querySelector('.stocks-container');
            const lastCard = container.lastElementChild;
            lastCard.remove();
            stockCount--;
            updateRemoveButton();
        }
        
        // Update remove button state
        function updateRemoveButton() {
            const removeBtn = document.getElementById('removeBtn');
            if (stockCount <= 1) {
                removeBtn.disabled = true;
            } else {
                removeBtn.disabled = false;
            }
        }
        
        // Stock autocomplete functionality using Finnhub API
        let debounceTimer;
        
        function setupAutocomplete(index) {
            const input = document.getElementById(`stock${index}`);
            const dropdown = document.getElementById(`dropdown${index}`);
            
            if (!input || !dropdown) return;
            
            input.addEventListener('input', function() {
                const query = this.value.trim().toUpperCase();
                
                clearTimeout(debounceTimer);
                
                if (query.length < 1) {
                    dropdown.classList.remove('active');
                    return;
                }
                
                debounceTimer = setTimeout(() => {
                    fetchStockSuggestions(query, dropdown, input);
                }, 300);
            });
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function(e) {
                if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('active');
                }
            });
        }
        
        async function fetchStockSuggestions(query, dropdown, input) {
            try {
                // Using Finnhub API for stock symbol search
                const apiKey = 'ct2vgupr01qsc9hsn4sgct2vgupr01qsc9hsn4t0'; // Free tier API key
                const response = await fetch(`https://finnhub.io/api/v1/search?q=${query}&token=${apiKey}`);
                const data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    displaySuggestions(data.result.slice(0, 8), dropdown, input);
                } else {
                    dropdown.classList.remove('active');
                }
            } catch (error) {
                console.error('Error fetching stock data:', error);
                dropdown.classList.remove('active');
            }
        }
        
        function displaySuggestions(suggestions, dropdown, input) {
            dropdown.innerHTML = '';
            
            suggestions.forEach(stock => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                item.innerHTML = `
                    <div class="autocomplete-symbol">${stock.symbol}</div>
                    <div class="autocomplete-name">${stock.description}</div>
                `;
                
                item.addEventListener('click', function() {
                    input.value = stock.symbol;
                    dropdown.classList.remove('active');
                });
                
                dropdown.appendChild(item);
            });
            
            dropdown.classList.add('active');
        }

        // IMPROVED OUTPUT FORMATTING - Claude-style display
        function formatAnalysis(raw) {
            if (!raw || raw.trim() === '') return '';

            const lines = raw.trim().split('\n');
            let html = '';
            let i = 0;

            while (i < lines.length) {
                const line = lines[i];
                const trimmed = line.trim();

                // Skip empty lines (but use them for spacing)
                if (trimmed === '') {
                    i++;
                    continue;
                }

                // Headers: ## for h2, ### for h3
                if (trimmed.startsWith('##')) {
                    const title = trimmed.replace(/^#+\s*/, '');
                    html += `<h2 style="font-size: 1.1rem; color: #c0c0c0; margin: 20px 0 12px 0; font-weight: 600; letter-spacing: 0.5px;">${escapeHtml(title)}</h2>`;
                    i++;
                    continue;
                }

                if (trimmed.startsWith('#')) {
                    const title = trimmed.replace(/^#+\s*/, '');
                    html += `<h3 style="font-size: 1rem; color: #d4d4d4; margin: 16px 0 10px 0; font-weight: 600;">${escapeHtml(title)}</h3>`;
                    i++;
                    continue;
                }

                // Code blocks: ```language...```
                if (trimmed.startsWith('```')) {
                    const codeLines = [];
                    i++;
                    while (i < lines.length && !lines[i].trim().startsWith('```')) {
                        codeLines.push(lines[i]);
                        i++;
                    }
                    if (i < lines.length) i++; // skip closing ```
                    html += `<pre style="font-family: 'Courier New', monospace; font-size: 0.85rem; line-height: 1.6; color: #d4d4d4; white-space: pre-wrap; word-break: break-word; margin: 16px 0; background: rgba(10, 10, 10, 0.6); padding: 16px; border-radius: 8px; border: 1px solid rgba(80, 80, 80, 0.2); overflow-x: auto; max-width: 100%;">${escapeHtml(codeLines.join('\n'))}</pre>`;
                    continue;
                }

                // Bullet lists: -, *, •
                if (trimmed.match(/^[-*•]\s/)) {
                    const listItems = [];
                    while (i < lines.length && lines[i].trim().match(/^[-*•]\s/)) {
                        const text = lines[i].trim().replace(/^[-*•]\s*/, '');
                        listItems.push(text);
                        i++;
                    }
                    html += `<ul style="margin: 16px 0; padding-left: 24px; list-style: disc; color: #d4d4d4; line-height: 1.6;">`;
                    listItems.forEach(item => {
                        html += `<li style="margin: 8px 0;">${formatInlineMarkdown(escapeHtml(item))}</li>`;
                    });
                    html += `</ul>`;
                    continue;
                }

                // Numbered lists: 1. 2. 3. etc
                if (trimmed.match(/^\d+\.\s/)) {
                    const listItems = [];
                    while (i < lines.length && lines[i].trim().match(/^\d+\.\s/)) {
                        const text = lines[i].trim().replace(/^\d+\.\s*/, '');
                        listItems.push(text);
                        i++;
                    }
                    html += `<ol style="margin: 16px 0; padding-left: 24px; list-style: decimal; color: #d4d4d4; line-height: 1.6;">`;
                    listItems.forEach(item => {
                        html += `<li style="margin: 8px 0;">${formatInlineMarkdown(escapeHtml(item))}</li>`;
                    });
                    html += `</ol>`;
                    continue;
                }

                // Regular paragraph
                html += `<p style="margin: 12px 0; line-height: 1.65; color: #d4d4d4;">${formatInlineMarkdown(escapeHtml(trimmed))}</p>`;
                i++;
            }

            return html || `<p style="color: #d4d4d4;">${escapeHtml(raw)}</p>`;
        }

        // Format inline markdown: **bold**, *italic*, `code`
        function formatInlineMarkdown(text) {
            // Bold: **text** or __text__
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong style="color: #e0e0e0; font-weight: 600;">$1</strong>');
            text = text.replace(/__(.+?)__/g, '<strong style="color: #e0e0e0; font-weight: 600;">$1</strong>');

            // Italic: *text* or _text_ (but not within bold)
            text = text.replace(/\*([^*]+)\*/g, '<em style="color: #b8b8b8; font-style: italic;">$1</em>');
            text = text.replace(/_([^_]+)_/g, '<em style="color: #b8b8b8; font-style: italic;">$1</em>');

            // Inline code: `code`
            text = text.replace(/`([^`]+)`/g, '<code style="background: rgba(10, 10, 10, 0.8); color: #79d3c3; padding: 2px 6px; border-radius: 3px; font-family: monospace; font-size: 0.9em;">$1</code>');

            return text;
        }

        // Helper to safely escape HTML
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Portfolio optimization with improved output display
        async function optimizePortfolio() {
            let stocks = [];

            for (let i = 1; i <= stockCount; i++) {
                const stockInput = document.getElementById(`stock${i}`);
                const qtyInput = document.getElementById(`qty${i}`);

                if (stockInput && qtyInput) {
                    const symbol = stockInput.value.trim();
                    const qty = parseInt(qtyInput.value) || 0;

                    if (symbol && qty > 0) {
                        stocks.push({
                            symbol: symbol,
                            qty: qty
                        });
                    }
                }
            }

            if (stocks.length === 0) {
                alert("Enter at least one stock");
                return;
            }

            try {
                const res = await fetch("http://127.0.0.1:5001/submit-portfolio", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(stocks)
                });

                const data = await res.json();

                if (data.analysis) {
                    const outputDisplay = document.getElementById("outputDisplay");
                    const outputContent = document.getElementById("outputContent");

                    // Format the analysis using new Claude-style formatter
                    const formattedHtml = formatAnalysis(data.analysis);

                    outputContent.innerHTML = `
                        <div class="output-card">
                            <div class="output-header">
                                <span class="output-title">Portfolio Analysis</span>
                                <span class="output-badge">${stocks.length} asset${stocks.length !== 1 ? 's' : ''}</span>
                            </div>
                            <div class="output-body">
                                ${formattedHtml}
                            </div>
                        </div>
                    `;

                    outputDisplay.classList.add("active");
                    
                    // Smooth scroll to output
                    setTimeout(() => {
                        outputDisplay.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 100);
                }
            } catch (err) {
                console.error(err);
                alert("Backend error");
            }
        }

        // Initialize autocomplete for initial stock inputs
        for (let i = 1; i <= stockCount; i++) {
            setupAutocomplete(i);
        }
        
        updateRemoveButton();
        
        // Subtle mouse tracking
        const mouseGradient = document.getElementById('mouseGradient');
        document.addEventListener('mousemove', (e) => {
            mouseGradient.style.left = e.clientX + 'px';
            mouseGradient.style.top = e.clientY + 'px';
        });
        
        // Minimal 3D card tilt for initial cards
        const cards = document.querySelectorAll('.stock-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-8px)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0)';
            });
        });
    </script>
</body>
</html>
